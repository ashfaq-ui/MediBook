name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "Frontend/**"
  pull_request:
    branches: [main]
    paths:
      - "Frontend/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        working-directory: Frontend
        run: npm install

      - name: Build
        working-directory: Frontend
        run: npm run build
